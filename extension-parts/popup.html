<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #0d1526;
      color: #e2e8f0;
      font-size: 13px;
    }
    .header {
      background: #1e293b;
      padding: 12px 16px;
      border-bottom: 2px solid #F97316;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #F97316;
    }
    .content { padding: 16px; }
    .product-card {
      background: #1e293b;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .product-card img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      border-radius: 4px;
      background: #fff;
      float: left;
      margin-right: 10px;
    }
    .product-title {
      font-size: 12px;
      font-weight: 500;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-meta {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
    }
    .product-price {
      font-size: 16px;
      font-weight: 700;
      color: #F97316;
      margin-top: 4px;
    }
    .clear { clear: both; }
    label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
      margin-bottom: 4px;
      margin-top: 10px;
    }
    select, input {
      width: 100%;
      padding: 8px 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
    }
    select:focus, input:focus { border-color: #F97316; }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #F97316;
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 14px;
    }
    .btn:hover { background: #ea6c0a; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      text-align: center;
      font-size: 12px;
      margin-top: 8px;
      min-height: 16px;
    }
    .status.ok { color: #10b981; }
    .status.err { color: #ef4444; }
    .setup { padding: 20px 16px; }
    .setup input { margin-top: 6px; }
    .setup .btn { margin-top: 12px; }
    .no-product {
      padding: 40px 16px;
      text-align: center;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:18px">🔧</span>
    <h1>TicketHub Parts</h1>
  </div>

  <div id="setup-view" class="setup" style="display:none">
    <p style="color:#94a3b8;font-size:12px">
      Enter your TicketHub URL to connect the extension.
    </p>
    <label>TicketHub URL</label>
    <input type="url" id="base-url" placeholder="https://tickethub.pcc2k.com" />
    <button class="btn" id="save-url-btn">Save & Connect</button>
  </div>

  <div id="no-product-view" class="no-product" style="display:none">
    <p>Navigate to an Amazon product page to scrape parts.</p>
  </div>

  <div id="main-view" class="content" style="display:none">
    <div class="product-card" id="product-card">
      <img id="product-img" src="" alt="" />
      <div class="product-title" id="product-title"></div>
      <div class="product-meta" id="product-meta"></div>
      <div class="product-price" id="product-price"></div>
      <div class="clear"></div>
    </div>

    <label>Add to Ticket</label>
    <select id="ticket-select">
      <option value="">Loading tickets...</option>
    </select>

    <div class="row">
      <div>
        <label>Qty</label>
        <input type="number" id="qty" value="1" min="1" />
      </div>
      <div>
        <label>Markup %</label>
        <input type="number" id="markup" value="20" min="0" />
      </div>
    </div>

    <div>
      <label>Client Price</label>
      <input type="text" id="client-price" readonly />
    </div>

    <button class="btn" id="add-btn">Add Part to Ticket</button>
    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
