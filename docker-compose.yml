# TicketHub deployment — separate compose from DocHub on purpose so a bad
# restart here can never take DocHub down. Attaches to DocHub's existing
# dockernetwork as external so TicketHub can reach the shared db container
# at `db:5432` without touching DocHub's compose.
#
# Usage:
#   docker compose -f ~/tickethub/docker-compose.yml up -d --build
#   docker compose -f ~/tickethub/docker-compose.yml logs -f
#   docker compose -f ~/tickethub/docker-compose.yml down

services:
  app:
    image: tickethub:local
    container_name: tickethub-app
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Host port 3001 → container 3000. nginx reverse-proxies to :3001.
      - "3001:3000"
    env_file: .env.local
    networks:
      - dochub_default

networks:
  dochub_default:
    external: true
